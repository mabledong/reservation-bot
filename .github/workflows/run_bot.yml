name: Restaurant Booking Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright httpx
          playwright install chromium

      - name: Run Resy bot
        env:
          RESY_TOKEN: ${{ secrets.RESY_TOKEN }}
          RESY_API_KEY: ${{ secrets.RESY_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RESY_PHONE: ${{ secrets.RESY_PHONE }}
        run: python resy_bot.py

      - name: Run OpenTable checker
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python opentable_bot.py
